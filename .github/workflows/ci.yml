name: Lint, test, compile

on:
  push:
    branches:
      - master    
  pull_request:
    branches:
      - master  

permissions:
  contents: read
  pull-requests: write

jobs:
  LintTestCompile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup Docker
        uses: docker/setup-docker-action@v4

      - name: Install dependencies
        run: npm ci
        working-directory: ./app

      - name: Run ESLint
        run: npm run lint
        working-directory: ./app
      
      - name: Run tests
        run: |
          npx jest --coverage --coverageReporters json-summary | tee ./coverage.txt && exit ${PIPESTATUS[0]}

      - name: Jest Coverage Comment
        uses: MishaKav/jest-coverage-comment@main
        with:
          coverage-summary-path: ./app/coverage/coverage-summary.json
          coverage-path: ./app/coverage.txt
          

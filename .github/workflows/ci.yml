name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/coverage
          if-no-files-found: error

  coverage-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Create coverage summary
        id: coverage
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const summaryPath = path.join(process.cwd(), "coverage", "coverage-summary.json");
          const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
          const total = summary.total;
          const linesPct = Number(total.lines.pct);
          const color = linesPct >= 80 ? "brightgreen" : linesPct >= 60 ? "yellow" : "red";
          const markdown = [
            "<!-- junto-coverage-report -->",
            "## Test Coverage",
            "",
            "| Metric | Percent | Covered / Total |",
            "| --- | ---: | ---: |",
            `| Lines | ${total.lines.pct}% | ${total.lines.covered} / ${total.lines.total} |`,
            `| Statements | ${total.statements.pct}% | ${total.statements.covered} / ${total.statements.total} |`,
            `| Functions | ${total.functions.pct}% | ${total.functions.covered} / ${total.functions.total} |`,
            `| Branches | ${total.branches.pct}% | ${total.branches.covered} / ${total.branches.total} |`,
            ""
          ].join("\n");

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${markdown}\n`);
          fs.writeFileSync(path.join(process.cwd(), "coverage-comment.md"), markdown);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `coverage=${total.lines.pct}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `color=${color}\n`);
          NODE

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- junto-coverage-report -->";
            const body = fs.readFileSync("coverage-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existingComment = comments.find(comment =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && env.JEST_COVERAGE_COMMENT != ''
        uses: schneegans/dynamic-badges-action@v1.8.0
        env:
          JEST_COVERAGE_COMMENT: ${{ secrets.JEST_COVERAGE_COMMENT }}
        with:
          auth: ${{ secrets.JEST_COVERAGE_COMMENT }}
          gistID: 36cfc391c70f4ddf96bbd984c1276760
          filename: junto__master.json
          label: Coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          color: ${{ steps.coverage.outputs.color }}
